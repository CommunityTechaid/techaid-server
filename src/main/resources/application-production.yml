auth:
  cors:
    enabled: true
    routes:
      - origin: 'https://app.communitytechaid.org.uk'
        path: '*'
        headers:
          Access-Control-Allow-Methods: 'GET, POST, PUT, PATCH, DELETE, OPTIONS'
          Access-Control-Allow-Headers: '*'
      - origin: 'https://app-testing.communitytechaid.org.uk'
        path: '*'
        headers:
          Access-Control-Allow-Methods: 'GET, POST, PUT, PATCH, DELETE, OPTIONS'
          Access-Control-Allow-Headers: '*'

logging.level:
  cta: DEBUG